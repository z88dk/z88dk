#
# Target configuration file for Heath/Zenith HDOS
#

INCLUDE tools.inc

# Asm file which contains the startup code (without suffix)
CRT0		 DESTDIR/lib/target/hdos/classic/hdos_crt0

# Any default options you want - these are options to zcc which are fed
# through to compiler, assembler etc as necessary
OPTIONS		 -O2 -SO2 -iquote. -D__Z80__ -D__Z80 -DHDOS -D__HDOS__ -clib=default -Cc-standard-escape-chars -subtype=default

CLIB		default -lhdos_clib -LDESTDIR/lib/clibs/z80 -D__Z80__ -D__Z80
CLIB		h19 -lhdos_clib --generic-console -pragma-define:CONSOLE_ROWS=25 -LDESTDIR/lib/clibs/z80 -D__Z80__ -D__Z80

SUBTYPE     none 
SUBTYPE     default -Cz+hdos

INCLUDE alias.inc

