#
# Target configuration file for z88dk
#
# +pps_low: Sprinter with code loaded at $4100 (WIN1) and stack at
# $7FFF (top of WIN1). This is a low-origin memory layout for programs
# that need to start below the default WIN2 address.
#
# If a program is expected to grow past $7FFF, override CRT_STACK as
# well; the stack must be placed so that it cannot collide with code,
# data or heap.
#

INCLUDE tools.inc

CRT0		 DESTDIR/lib/target/pps/classic/pps_crt0

OPTIONS		 -O2 -SO2 -iquote. -D__Z80__ -D__Z80 -DSPRINTER -D__SPRINTER__ -clib=default -Cc-standard-escape-chars -Cz+noop -pragma-define:CRT_ORG_CODE=0x4100 -pragma-define:CRT_STACK=0x7FFF

CLIB            default -lpps_clib -LDESTDIR/lib/clibs/z80
CLIB            ansi -pragma-need=ansiterminal -D__CONIO_VT100 -lpps_clib -LDESTDIR/lib/clibs/z80

INCLUDE alias.inc
